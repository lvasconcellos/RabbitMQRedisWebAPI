version: "3.8"
services:
  rabbitmq:
    image: "rabbitmq:management"
    container_name: "rabbitmq"
    ports:
      - "5672:5672" # RabbitMQ
      - "15672:15672" # Management UI
    env_file:
      - .env # Load variables from .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}

  redis:
    image: "redis"
    container_name: "redis"
    ports:
      - "6379:6379"
